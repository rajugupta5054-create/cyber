services:
  - type: web
    name: geotrace-cybersecurity
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --threads 2 --timeout 120 --bind 0.0.0.0:$PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: geotrace-data
      mountPath: /opt/render/project/src/instance
      sizeGB: 1
